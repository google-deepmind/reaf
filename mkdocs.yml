site_name: Robotics Environment Authoring Framework (REAF)
theme:
   name: readthedocs
   favicon: img/favicon.ico
   logo: img/logo.png
site_url: !ENV READTHEDOCS_CANONICAL_URL
repo_url: https://github.com/google-deepmind/reaf
# docs_dir: ''

plugins:
- search
- mkdocstrings
# - gh-admonitions

nav:
- Overview: index.md
- Core concepts: core_concepts.md
- Best practices: best_practices.md
- Tutorials:
  - Overview: tutorials/index.md
  - The Device concept: tutorials/simple_env_from_devices.md
  - Creating a task: tutorials/tasks.md
  - Resetting the environment: tutorials/reset_functions.md
  - Environment adapters: tutorials/adapters.md
- License and Disclaimer: license.md 